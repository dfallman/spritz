name: release

# Builds the spritz binary for 5 targets and uploads each archive
# to the GitHub Release that release-plz already created for the tag.
#
# Trigger: workflow_dispatch only. release-plz.yml's release job calls
# `gh workflow run release.yml -f tag=<tag>` after it pushes the tag
# and creates the release. workflow_dispatch is one of the two event
# types that still fire downstream workflows when triggered by a
# GITHUB_TOKEN, so no PAT is required.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build binaries for (e.g. v0.1.2)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.xz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.xz
            # Cross-compiled with gcc-aarch64-linux-gnu.
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.xz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.xz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install aarch64 cross-compiler (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      # Embed the dependency tree (crate names + versions) into the binary
      # so future `cargo audit bin spritz` can scan the shipped artifact
      # for advisories without needing the source.
      - name: Install cargo-auditable
        run: cargo install cargo-auditable --locked

      - name: Build
        run: cargo auditable build --release --target ${{ matrix.target }} --package cli

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          dir="spritz-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/spritz" "$dir/"
          cp LICENSE README.md CHANGELOG.md "$dir/"
          tar -cJf "$dir.tar.xz" "$dir"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$dir.tar.xz" > "$dir.tar.xz.sha256"
          else
            shasum -a 256 "$dir.tar.xz" > "$dir.tar.xz.sha256"
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "spritz-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/spritz.exe" $dir
          Copy-Item LICENSE, README.md, CHANGELOG.md $dir
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"
          $hash = (Get-FileHash "$dir.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $dir.zip" | Set-Content -Encoding ASCII "$dir.zip.sha256"

      - name: Upload archive + checksum to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          archive="spritz-${{ matrix.target }}.${{ matrix.archive }}"
          gh release upload "${{ inputs.tag }}" "$archive" "$archive.sha256" --clobber
