name: release-plz

on:
  push:
    branches:
      - main

# Two-job setup per release-plz guidance:
#   - release-plz-pr: opens / updates the release PR whenever new
#     conventional commits land on main.
#   - release-plz-release: runs after that PR is merged (or after any
#     other push to main) and creates the annotated git tag + GitHub Release.
# Both jobs are idempotent and no-op when there's nothing to do.

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'dfallman' }}
    permissions:
      contents: write
      # Needed so release-plz can list the PR associated with each
      # commit when building the GitHub Release notes.
      pull-requests: read
      # Needed for the final step to dispatch release.yml (cargo-dist).
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # release-plz needs the full history to classify commits by tag.
          fetch-depth: 0
          persist-credentials: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # release-plz doesn't create a GitHub Release (see release-plz.toml:
      # git_release_enable = false). Instead, it pushes the tag and we
      # dispatch cargo-dist's release workflow to build + publish binaries.
      # workflow_dispatch is one of the few events that fires downstream
      # workflows even from GITHUB_TOKEN, so no PAT is required.
      - name: Dispatch cargo-dist release workflow
        if: ${{ steps.release-plz.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          # releases output is a JSON array; grab the tag of the first (only) entry
          tag=$(printf '%s' "$RELEASES" | jq -r '.[0].tag')
          echo "Dispatching release.yml for tag $tag"
          gh workflow run release.yml -f tag="$tag"

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'dfallman' }}
    permissions:
      contents: write
      pull-requests: write
    # Prevent concurrent runs from opening duplicate release PRs.
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
